name: Daily Video Generation

on:
  repository_dispatch:
    types: [generate-daily-video]
  workflow_dispatch:

jobs:
  generate-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'
      - name: Randomize Video Format
        run: |
          FORMATS=("standard" "fail" "interactive" "glitch" "bad_donkey_silent" "bad_donkey_tts" "split")
          SELECTED_FORMAT=${FORMATS[$(( $RANDOM % 7 ))]}
          echo "Selected Format: $SELECTED_FORMAT"
          echo "FORMAT=$SELECTED_FORMAT" >> $GITHUB_ENV



      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgbm-dev ffmpeg
      
      - name: Install Node Dependencies
        run: npm ci

      - name: Generate Video
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 720x1280x24" node scripts/generate_video.js

      - name: Build Application
        run: npm run build

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting:lightning-words --project go-rabbit-4af82 --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily_video
          path: public/*.mp4
          retention-days: 1

      - name: Trigger Zapier Distribution
        if: success()
        run: |
          CAPTIONS=(
            "Can you remember the hidden words? ⚡ Play free at oops-games-hub.web.app"
            "Only 1% of players memorize this sequence perfectly! Try it free at oops-games-hub.web.app 🍎"
            "Today's Lightning Words Daily Challenge! ⚡ Are you smart enough? Play free at oops-games-hub.web.app"
          )
          YOUTUBE_TITLES=(
            "Can You Spell The Sequence? (#Shorts)"
            "Fastest Way To Solve Today's Memory Puzzle (#Gaming)"
            "Daily Lightning Words Puzzle (#BrainTeaser)"
          )
          R_INDEX=$(( $RANDOM % 3 ))
          CAPTION="${CAPTIONS[$R_INDEX]} #BrainTraining #DailyPuzzle #MemoryGame #"$(date +'%Y%m%d')
          YT_TITLE="${YOUTUBE_TITLES[$R_INDEX]}"
          TS=$(date +'%s')
          
          VIDEO_FILE=$(basename $(ls public/*.mp4 | head -n 1))
          
          curl --fail --silent --show-error -X POST -H "Content-Type: application/json" \
          -d "{\"video_url\": \"https://lightning-words.web.app/$VIDEO_FILE?t=$TS\", \"text\": \"$CAPTION\", \"youtube_title\": \"$YT_TITLE\", \"target_channel\": \"all\"}" \
          https://hooks.zapier.com/hooks/catch/27231889/ujm5mjh/ || exit 1
